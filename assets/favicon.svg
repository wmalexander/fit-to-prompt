<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <rect width="512" height="512" rx="64" fill="#8B0000"/>
  <g transform="translate(56, 72)">
    <!-- Newspaper body -->
    <rect x="0" y="40" width="400" height="320" rx="12" fill="#f8f8f8"/>
    <!-- Folded top -->
    <path d="M0 52 C0 44 4 40 12 40 L320 40 L320 0 L388 40 L400 40 C396 40 400 44 400 52" fill="#e8e8e8"/>
    <line x1="320" y1="0" x2="320" y2="40" stroke="#d0d0d0" stroke-width="2"/>
    <!-- Masthead -->
    <rect x="40" y="70" width="320" height="6" rx="3" fill="#1a1a1a"/>
    <!-- Headline -->
    <rect x="40" y="100" width="280" height="14" rx="4" fill="#1a1a1a"/>
    <rect x="40" y="122" width="220" height="14" rx="4" fill="#1a1a1a"/>
    <!-- Divider -->
    <line x1="40" y1="155" x2="360" y2="155" stroke="#d1d5db" stroke-width="2"/>
    <!-- Two columns of text lines -->
    <rect x="40" y="172" width="155" height="8" rx="3" fill="#9ca3af"/>
    <rect x="40" y="190" width="155" height="8" rx="3" fill="#9ca3af"/>
    <rect x="40" y="208" width="155" height="8" rx="3" fill="#9ca3af"/>
    <rect x="40" y="226" width="120" height="8" rx="3" fill="#9ca3af"/>
    <rect x="40" y="252" width="155" height="8" rx="3" fill="#9ca3af"/>
    <rect x="40" y="270" width="155" height="8" rx="3" fill="#9ca3af"/>
    <rect x="40" y="288" width="100" height="8" rx="3" fill="#9ca3af"/>
    <rect x="215" y="172" width="145" height="8" rx="3" fill="#9ca3af"/>
    <rect x="215" y="190" width="145" height="8" rx="3" fill="#9ca3af"/>
    <rect x="215" y="208" width="145" height="8" rx="3" fill="#9ca3af"/>
    <rect x="215" y="226" width="110" height="8" rx="3" fill="#9ca3af"/>
    <!-- Image placeholder in right column -->
    <rect x="215" y="248" width="145" height="68" rx="6" fill="#d1d5db"/>
  </g>
